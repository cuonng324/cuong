<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>XUTOPTOP.VN - Hệ Thống Nạp Xu Uy Tín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 28px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); }
        .xu-item { background: white; border: 2px solid #e2e8f0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .xu-item.active { border-color: #fe2c55; background: #fff1f2; transform: scale(1.03); box-shadow: 0 10px 20px rgba(254, 44, 85, 0.1); }
        .xu-item.active::after { content: "\f058"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; top: 8px; right: 8px; color: #fe2c55; font-size: 14px; }
        .btn-main { background: linear-gradient(135deg, #fe2c55 0%, #ff5e78 100%); box-shadow: 0 10px 25px rgba(254, 44, 85, 0.3); }
        #toast { visibility: hidden; background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #toast.show { visibility: visible; animation: slideUp 0.5s; }
        @keyframes slideUp { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 30px; } }
        .feedback-animate { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-10">
    <div id="toast">Thông báo</div>

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-black p-2 rounded-xl text-white"><i class="fa-brands fa-tiktok text-xl"></i></div>
                <div>
                    <h1 class="font-black text-xl tracking-tighter uppercase italic">XUTOPTOP<span class="text-[#fe2c55]">.VN</span></h1>
                    <p class="text-[8px] font-bold text-green-500 uppercase tracking-[2px] animate-pulse">● ĐANG HOẠT ĐỘNG</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-slate-900 p-3 rounded-2xl">
            <div class="flex items-center gap-3 text-white">
                <i class="fa-solid fa-circle-check text-green-400"></i>
                <div class="text-[10px] font-bold italic" id="live-history">Hệ thống sẵn sàng...</div>
            </div>
        </div>

        <section class="glass-card p-6">
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-3 tracking-widest italic text-center">Bước 1: Nhập ID TikTok</label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">@</span>
                <input type="text" id="tiktok-id" placeholder="NHAP.ID.CUA.BAN" class="w-full pl-10 pr-4 py-4 rounded-2xl bg-slate-50 border-none outline-none font-extrabold text-lg focus:ring-2 focus:ring-rose-500 uppercase text-center">
            </div>
        </section>

        <section class="glass-card p-6 border-t-[6px] border-[#fe2c55]">
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest italic text-center">Bước 2: Chọn số lượng xu</label>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="xu-item p-4 rounded-2xl text-center active" onclick="selectXu(500, 145500, this)">
                    <p class="font-black text-2xl italic">500</p>
                    <p class="text-[10px] font-bold text-slate-400">145,500đ</p>
                </div>
                <div class="xu-item p-4 rounded-2xl text-center" onclick="selectXu(1000, 285000, this)">
                    <p class="font-black text-2xl italic">1,000</p>
                    <p class="text-[10px] font-bold text-slate-400">285,000đ</p>
                </div>
            </div>

            <div class="bg-slate-100 p-4 rounded-2xl mb-6 shadow-inner">
                <label class="block text-[9px] font-black uppercase text-slate-500 mb-2">Hoặc tự nhập số xu khác:</label>
                <div class="relative">
                    <input type="number" id="custom-xu" placeholder="Tối thiểu 30 xu" oninput="calcCustomXu(this.value)" class="w-full p-3 rounded-xl border-2 border-white focus:border-rose-500 outline-none font-black text-rose-500 text-center text-xl">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 font-black text-slate-400 text-xs italic">XU</span>
                </div>
            </div>

            <div class="pt-5 border-t-2 border-dashed border-slate-100 flex justify-between items-center">
                <div class="w-1/2">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Thanh toán:</p>
                    <p id="total-price" class="text-2xl font-black italic tracking-tighter text-slate-900 leading-none">145,500đ</p>
                </div>
                <button onclick="processPayment()" class="btn-main text-white w-1/2 py-4 rounded-2xl font-black uppercase italic text-xs active:scale-95 transition-all">NẠP NGAY</button>
            </div>
        </section>

        <section class="glass-card p-6 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic"><i class="fa-solid fa-star text-yellow-400 mr-1"></i> Phản hồi khách hàng</h3>
                <span class="bg-rose-100 text-rose-500 text-[8px] px-2 py-1 rounded-full font-bold">10M+ REVIEW</span>
            </div>
            <div id="feedback-live-box" class="space-y-4 h-[180px] overflow-hidden relative">
                </div>
        </section>

        <div class="grid grid-cols-3 gap-3">
            <a href="https://zalo.me/0326457411" target="_blank" class="glass-card p-4 flex flex-col items-center gap-1 border-b-4 border-blue-500 active:scale-95 transition-all"><i class="fa-solid fa-comment-dots text-blue-500 text-xl"></i><span class="text-[9px] font-black uppercase">Zalo</span></a>
            <a href="https://www.facebook.com/nguyen.vo.quoc.cuong.801904/" target="_blank" class="glass-card p-4 flex flex-col items-center gap-1 border-b-4 border-indigo-600 active:scale-95 transition-all"><i class="fa-brands fa-facebook text-indigo-600 text-xl"></i><span class="text-[9px] font-black uppercase">FB</span></a>
            <a href="https://www.tiktok.com/@userqjzxc4ik4x" target="_blank" class="glass-card p-4 flex flex-col items-center gap-1 border-b-4 border-black active:scale-95 transition-all"><i class="fa-brands fa-tiktok text-black text-xl"></i><span class="text-[9px] font-black uppercase">TikTok</span></a>
        </div>
    </main>

    <div id="modalPay" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[40px] w-full max-w-sm p-8 text-center relative shadow-2xl">
            <h3 class="font-black italic text-xl uppercase mb-5">Thông Tin Thanh Toán</h3>
            <img id="qr-code" src="" class="w-60 h-60 mx-auto rounded-3xl border-4 border-slate-50 mb-5 shadow-lg">
            <div class="bg-slate-100 p-4 rounded-3xl text-left space-y-2 mb-5 cursor-pointer" onclick="copyText()">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Nội dung (Bấm để copy):</p>
                <p id="copy-content" class="font-black text-rose-500 italic break-all text-sm uppercase text-center"></p>
                <p id="final-amount" class="text-xl font-black text-slate-900 pt-2 border-t border-slate-200 text-center"></p>
            </div>
            <button onclick="window.location.href='https://zalo.me/0326457411'" class="w-full bg-[#0068ff] text-white py-4 rounded-2xl font-black uppercase text-xs mb-3 shadow-lg shadow-blue-200">Xác nhận đơn qua Zalo</button>
            <button onclick="document.getElementById('modalPay').classList.add('hidden')" class="text-slate-400 font-bold text-[10px] uppercase underline py-2 block">Quay lại</button>
        </div>
    </div>

    <script>
        let selectedXu = 500; let selectedPrice = 145500; const GIA_SAN = 285;

        // Feedback System
        const fData = {
            names: ["Thanh_Tung", "Ngoc_Mai", "Bao_Anh", "Hoang_Long", "Khanh_Vy", "Gia_Huy", "Thuy_Linh", "Quoc_Cuong", "Minh_Quan", "Yen_Nhi"],
            msgs: ["Xu về cực nhanh, uy tín nhé!", "Nạp lần đầu thấy rất ok.", "Giá rẻ hơn hẳn trên app luôn.", "Admin hỗ trợ Zalo siêu nhiệt tình.", "Web mượt, nạp tự động quá tiện.", "Đã nạp gói 2 triệu xu thành công.", "Cảm ơn shop, ủng hộ dài dài!", "Uy tín 100% mọi người ơi.", "Bảo mật ID cực tốt, an tâm."],
            times: ["Vừa xong", "1 phút trước", "Vừa tức thì", "30 giây trước"]
        };

        function addFeedback() {
            const box = document.getElementById('feedback-live-box');
            const item = `
                <div class="feedback-item feedback-animate flex gap-3 p-3 bg-white/50 rounded-2xl border border-white">
                    <img src="https://i.pravatar.cc/100?u=${Math.random()}" class="w-10 h-10 rounded-full border-2 border-rose-100 shadow-sm">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <p class="text-[11px] font-black text-slate-800 tracking-tighter uppercase italic">@${fData.names[Math.floor(Math.random()*fData.names.length)]}</p>
                            <span class="text-[8px] font-bold text-slate-400 uppercase">${fData.times[Math.floor(Math.random()*fData.times.length)]}</span>
                        </div>
                        <div class="flex text-yellow-400 text-[8px] mb-1"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                        <p class="text-[11px] text-slate-600 leading-tight font-medium italic">"${fData.msgs[Math.floor(Math.random()*fData.msgs.length)]}"</p>
                    </div>
                </div>`;
            box.insertAdjacentHTML('afterbegin', item);
            if(box.children.length > 3) box.removeChild(box.lastChild);
        }
        setInterval(addFeedback, 4000); addFeedback(); addFeedback();

        // Xu Logic
        function selectXu(xu, price, el) {
            selectedXu = xu; selectedPrice = price;
            document.querySelectorAll('.xu-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('custom-xu').value = '';
            updateUI();
        }

        function calcCustomXu(v) {
            const x = parseInt(v);
            if(x >= 30) {
                selectedXu = x; selectedPrice = x * GIA_SAN;
                document.querySelectorAll('.xu-item').forEach(i => i.classList.remove('active'));
            } else { selectedXu = 0; selectedPrice = 0; }
            updateUI();
        }

        function updateUI() { document.getElementById('total-price').innerText = selectedPrice.toLocaleString() + "đ"; }

        function processPayment() {
            const id = document.getElementById('tiktok-id').value.trim();
            if(!id) { showToast("⚠️ Hãy nhập ID TikTok!"); return; }
            if(selectedXu < 30) { showToast("⚠️ Nạp tối thiểu 30 xu!"); return; }
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#fe2c55', '#ffffff'] });
            const content = `HEO ${id.toUpperCase()} ${selectedXu}`;
            document.getElementById('copy-content').innerText = content;
            document.getElementById('final-amount').innerText = selectedPrice.toLocaleString() + "đ";
            document.getElementById('qr-code').src = `https://api.vietqr.io/image/970422-0326457411-hO89V7G.jpg?accountName=NGUYEN%20VO%20QUOC%20CUONG&amount=${selectedPrice}&addInfo=${encodeURIComponent(content)}`;
            document.getElementById('modalPay').classList.remove('hidden');
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('copy-content').innerText);
            showToast("✅ Đã copy nội dung!");
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        // Live History
        function updateHistory() {
            const u = fData.names[Math.floor(Math.random()*fData.names.length)];
            const x = [100, 500, 1000, 5000][Math.floor(Math.random()*4)];
            document.getElementById('live-history').innerHTML = `Khách <span class="text-rose-500">@${u}</span> vừa nạp thành công <span class="text-yellow-400">${x.toLocaleString()} Xu</span>`;
        }
        setInterval(updateHistory, 4500); updateHistory();
    </script>
</body>
</html>
